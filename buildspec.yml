version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to ECR
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin <ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo Build Docker image
      - docker build -t my-app .
      - docker tag my-app:latest <ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/my-app:latest

  post_build:
    commands:
      - echo Push to ECR
      - docker push <ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/my-app:latest
      - printf '[{"name":"my-container","imageUri":"<ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/my-app:latest"}]' > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
