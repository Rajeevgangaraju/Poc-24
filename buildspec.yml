version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to ECR
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 566540245122.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo Building Docker image
      - docker build -t poc-24-app .
      - docker tag poc-24-app:latest 566540245122.dkr.ecr.ap-south-1.amazonaws.com/poc-24-app:latest

  post_build:
    commands:
      - echo Pushing Docker image
      - docker push 566540245122.dkr.ecr.ap-south-1.amazonaws.com/poc-24-app:latest
      - printf '[{"name":"poc-container","imageUri":"566540245122.dkr.ecr.ap-south-1.amazonaws.com/poc-24-app:latest"}]' > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
